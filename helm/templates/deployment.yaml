apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 5000
          env:
            - name: VERSION
              value: "{{ .Values.image.tag }}"
         
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
          resources:
{{ toYaml .Values.resources | indent 12 }}
    
