image:
  repository: "888990920717.dkr.ecr.il-central-1.amazonaws.com/app-ecr"
  # This tag is automatically updated by the CI pipeline on every push to main.
  # Do not set it to "latest" — immutable tags (git SHA) enable exact rollbacks.
  tag: "034f6aa4ae339a3f7da6ebd2af4b97d5218e094f"
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

service:
  port: 80
  type: ClusterIP

ingress:
  enabled: true
  className: nginx
  hostname: "shiracloud.com"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    kubernetes.io/ingress.class: "nginx"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  cpuUtilization: 70
