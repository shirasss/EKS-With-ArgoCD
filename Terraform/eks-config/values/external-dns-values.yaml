provider: aws

aws:
  region: ${aws_region}
  zoneType: public

# Only manage records for this domain
domainFilters:
  - ${domain_name}

# txtOwnerId prevents external-dns instances in different clusters
# from overwriting each other's records
txtOwnerId: demo-eks

# create AND delete records when Ingresses are removed
policy: sync

serviceAccount:
  create: true
  name: external-dns

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
