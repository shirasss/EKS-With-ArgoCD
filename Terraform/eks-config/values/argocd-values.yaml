configs:
  params:
    # Disable TLS on the ArgoCD server — ingress-nginx handles it
    server.insecure: "true"
    # Tell ArgoCD its UI is served under /argocd
    server.rootpath: "/argocd"
dex:
  enabled: false

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: "${hostname}"
    path: /argocd
    pathType: Prefix
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/rewrite-target: /$2
